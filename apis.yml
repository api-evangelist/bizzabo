name: Bizzabo
description: Bizzabo is a B2B event experience platform with REST APIs for managing
  conferences, speakers, ticketing, attendee data, and event analytics and performance
  metrics. The open API enables developers to build custom integrations, automate
  event workflows, synchronize attendee data with CRM and marketing platforms, and
  deliver personalized event experiences at scale.
