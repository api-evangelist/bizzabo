apis:
  - name: Bizzabo Public API
    description: RESTful API for managing B2B events including conferences, speakers,
      ticketing, attendee registration, contacts, sessions, and event analytics. Enables
      third-party developers and Bizzabo customers to build custom integrations and
      automations on top of the Bizzabo Event Experience OS.
